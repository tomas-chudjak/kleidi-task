version: 2

project_name: kleidi-task

before:
  hooks:
    - go mod tidy

builds:
  - id: klt
    main: ./cmd/klt
    binary: klt
    ldflags:
      - -s -w -X github.com/tomas-chudjak/kleidi-task/internal/cli.version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: tomas-chudjak
    name: kleidi-task
