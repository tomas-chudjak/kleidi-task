version: "3"

vars:
  BINARY: kvt
  MODULE: github.com/ahoylog/kvik-tasks

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  build:
    desc: Build the kvt binary
    deps: [templ]
    cmds:
      - go build -o {{.BINARY}} ./cmd/kvt
    sources:
      - "**/*.go"
      - "**/*.templ"
    generates:
      - "{{.BINARY}}"

  run:
    desc: Build and run kvt serve
    deps: [build]
    cmds:
      - ./{{.BINARY}} serve

  test:
    desc: Run all tests
    cmds:
      - go test ./...

  test:verbose:
    desc: Run all tests with verbose output
    cmds:
      - go test -v ./...

  test:cover:
    desc: Run tests with coverage HTML report
    cmds:
      - go test -coverprofile=coverage.out ./...
      - go tool cover -html=coverage.out -o coverage.html
      - cmd: echo "Coverage report created at coverage.html"

  sqlc:
    desc: Generate Go code from SQL queries
    cmds:
      - sqlc generate
    sources:
      - internal/db/queries/*.sql
      - sqlc.yaml

  templ:
    desc: Generate Go code from templ templates
    cmds:
      - templ generate
    sources:
      - "**/*.templ"

  tidy:
    desc: Tidy Go modules
    cmds:
      - go mod tidy

  install:
    desc: Build and symlink kvt to /usr/local/bin
    deps: [build]
    cmds:
      - ln -sf $(pwd)/{{.BINARY}} /usr/local/bin/{{.BINARY}}
      - echo "Installed kvt $(kvt version) → $(pwd)/{{.BINARY}}"

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -f {{.BINARY}}
      - rm -f coverage.out coverage.html

  lint:
    desc: Run linters
    cmds:
      - go vet ./...

  check:
    desc: Run all checks (lint + test)
    cmds:
      - task: lint
      - task: test

  setup:
    desc: Install all required dev tools and build the project
    cmds:
      - echo "=== Installing dev tools ==="
      - go install github.com/a-h/templ/cmd/templ@latest
      - go install github.com/sqlc-dev/sqlc/cmd/sqlc@latest
      - go install github.com/pressly/goose/v3/cmd/goose@latest
      - go install github.com/air-verse/air@latest
      - echo "=== Tidying modules ==="
      - go mod tidy
      - echo "=== Building kvt ==="
      - task: install
      - echo "=== Setup complete ==="
      - kvt version

  dev:
    desc: Development mode with file watching (requires air)
    deps: [setup:check]
    cmds:
      - air

  setup:check:
    desc: Verify all dev tools are installed
    internal: true
    silent: true
    cmds:
      - which templ >/dev/null 2>&1 || { echo "Missing templ. Run 'task setup'"; exit 1; }
      - which sqlc >/dev/null 2>&1 || { echo "Missing sqlc. Run 'task setup'"; exit 1; }
      - which air >/dev/null 2>&1 || { echo "Missing air. Run 'task setup'"; exit 1; }
